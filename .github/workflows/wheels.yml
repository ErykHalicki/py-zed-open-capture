name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build_wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU (for linux_aarch64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp312-manylinux_aarch64"
          CIBW_ARCHS: "aarch64"
          CIBW_BEFORE_ALL_LINUX: "yum install -y libusbx-devel || (apt-get update && apt-get install -y libusb-1.0-0-dev)"
          CIBW_BUILD_VERBOSITY: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: wheelhouse/*.whl

  release:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: wheelhouse
      - uses: softprops/action-gh-release@v2
        with:
          files: wheelhouse/*.whl
